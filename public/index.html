<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bounty Scout</title>
<meta name="theme-color" content="#0d1117" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2129; --border:#2b323c;
    --text:#e6edf3; --muted:#8b949e; --accent:#2f81f7; --green:#3fb950;
    --amber:#d29922; --red:#f85149; --purple:#a371f7;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:10;background:rgba(13,17,23,.85);backdrop-filter:blur(8px);
         border-bottom:1px solid var(--border);padding:14px 16px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
  .grow{flex:1}
  button{cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--text);
         border-radius:8px;padding:8px 12px;font-size:14px;font-weight:600}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button:active{transform:translateY(1px)}
  .meta{font-size:12px;color:var(--muted)}
  main{padding:14px 16px 60px;max-width:820px;margin:0 auto}
  .filters{display:flex;gap:8px;overflow-x:auto;padding:12px 0;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);
        background:var(--panel);color:var(--muted)}
  .chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
  .card .top{display:flex;gap:12px;align-items:flex-start}
  .score{flex:0 0 auto;width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;
         font-weight:800;font-size:18px;background:var(--panel2);border:1px solid var(--border)}
  .s-hi{color:var(--green);border-color:var(--green)}
  .s-mid{color:var(--amber);border-color:var(--amber)}
  .s-lo{color:var(--muted)}
  .title{font-weight:700;font-size:15px;line-height:1.35;margin:0 0 4px}
  .sub{font-size:12.5px;color:var(--muted)}
  .amount{font-weight:800;color:var(--green)}
  .reasons{margin:10px 0 0;font-size:12.5px;color:var(--muted);line-height:1.5}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .tag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
  select{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600}
  a.open{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none;padding:7px 10px;border:1px solid var(--border);border-radius:8px}
  .status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}
  .st-new{background:var(--accent)} .st-watching{background:var(--purple)}
  .st-attempting{background:var(--amber)} .st-submitted{background:var(--green)} .st-claimed{background:var(--green)}
  .st-skip{background:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  .checklist{margin-top:10px;font-size:13px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
  .checklist label{display:flex;gap:8px;align-items:flex-start;padding:4px 0;cursor:pointer}
  .checklist code{background:#00000055;padding:1px 5px;border-radius:4px;font-size:12px}
  .banner{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--muted);margin-bottom:12px}
  .banner b{color:var(--text)}
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>💰 Bounty Scout</h1>
    <div class="grow"></div>
    <button id="notifyBtn" title="Enable alerts">🔔</button>
    <button id="refreshBtn" class="primary">Refresh</button>
  </div>
  <div class="meta" id="statusLine">Loading…</div>
</header>

<main>
  <div class="banner" id="modeBanner" style="display:none"></div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>
</main>

<script>
const API = "/api/bounties";
const STATUSES = ["new","watching","attempting","submitted","claimed","skip"];
const STATUS_LABEL = {new:"New",watching:"Watching",attempting:"Attempting",submitted:"PR Submitted",claimed:"Claimed 🏆",skip:"Skip"};
let bounties = [];
let filter = "worth";        // worth | all | attempting | submitted | claimed
let store = load();          // { [id]: { status, checks:{} } }

function load(){ try{ return JSON.parse(localStorage.getItem("bounty_store")||"{}"); }catch{ return {}; } }
function save(){ localStorage.setItem("bounty_store", JSON.stringify(store)); }
function stateFor(id){ return store[id] || (store[id]={status:"new",checks:{}}); }

function scoreClass(s){ return s>=70?"s-hi":s>=50?"s-mid":"s-lo"; }

function claimChecklist(b){
  const num = (b.url.match(/\/(\d+)$/)||[])[1] || "N";
  const steps = [
    ["claim","Comment <code>/attempt</code> on the issue to signal you're on it (Algora bounties)"],
    ["branch","Create a branch and write the fix + tests locally"],
    ["pr",`Open a PR that says <code>Closes #${num}</code> so it links to the bounty`],
    ["done","Comment <code>/claim #"+num+"</code> (or the platform's claim command) once merged"],
  ];
  const st = stateFor(b.id);
  return `<div class="checklist">${steps.map(([k,t])=>`
    <label><input type="checkbox" data-check="${b.id}" data-key="${k}" ${st.checks[k]?"checked":""}/>
    <span>${t}</span></label>`).join("")}</div>`;
}

function render(){
  const list = document.getElementById("list");
  let items = bounties.slice();
  if(filter==="worth") items = items.filter(b=>{const s=stateFor(b.id).status; return b.score>=55 && s!=="skip" && s!=="claimed";});
  else if(["attempting","submitted","claimed"].includes(filter)) items = items.filter(b=>stateFor(b.id).status===filter);

  if(!items.length){ list.innerHTML = `<div class="empty">Nothing here yet. Try the “All” filter or hit Refresh.</div>`; return; }

  list.innerHTML = items.map(b=>{
    const st = stateFor(b.id);
    const amt = b.amount_usd!=null ? `$${b.amount_usd.toLocaleString()}` : "$?";
    const showChecklist = ["attempting","submitted"].includes(st.status);
    return `<div class="card">
      <div class="top">
        <div class="score ${scoreClass(b.score)}">${b.score}</div>
        <div class="grow">
          <p class="title">${escapeHtml(b.title)}</p>
          <div class="sub"><span class="amount">${amt}</span> · ${escapeHtml(b.repo)} · ${b.comments} comments · ${b.source}</div>
        </div>
      </div>
      <div class="reasons">${(b.reasons||[]).join(" · ")}</div>
      <div class="tags">${(b.labels||[]).slice(0,5).map(l=>`<span class="tag">${escapeHtml(l)}</span>`).join("")}</div>
      <div class="actions">
        <span class="meta"><span class="status-dot st-${st.status}"></span>${STATUS_LABEL[st.status]}</span>
        <select data-status="${b.id}">
          ${STATUSES.map(s=>`<option value="${s}" ${st.status===s?"selected":""}>${STATUS_LABEL[s]}</option>`).join("")}
        </select>
        <a class="open" href="${b.url}" target="_blank" rel="noopener">Open issue ↗</a>
      </div>
      ${showChecklist ? claimChecklist(b) : ""}
    </div>`;
  }).join("");

  list.querySelectorAll("select[data-status]").forEach(sel=>{
    sel.onchange = e=>{ stateFor(e.target.dataset.status).status = e.target.value; save(); render(); };
  });
  list.querySelectorAll("input[data-check]").forEach(cb=>{
    cb.onchange = e=>{ stateFor(e.target.dataset.check).checks[e.target.dataset.key] = e.target.checked; save(); };
  });
}

function renderFilters(){
  const defs = [["worth","Worth attempting"],["all","All"],["attempting","Attempting"],["submitted","Submitted"],["claimed","Claimed"]];
  document.getElementById("filters").innerHTML = defs.map(([k,l])=>
    `<span class="chip ${filter===k?"active":""}" data-filter="${k}">${l}</span>`).join("");
  document.querySelectorAll(".chip").forEach(c=> c.onclick=()=>{ filter=c.dataset.filter; renderFilters(); render(); });
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

async function refresh(){
  const line = document.getElementById("statusLine");
  line.textContent = "Fetching bounties…";
  try{
    const r = await fetch(API);
    const data = await r.json();
    const prevIds = new Set(bounties.map(b=>b.id));
    bounties = data.bounties||[];
    line.textContent = `${bounties.length} bounties · updated ${new Date(data.generated_at).toLocaleTimeString()}`;
    const banner = document.getElementById("modeBanner");
    if(data.mode && data.mode!=="live"){
      /*banner.style.display="block";
       banner.innerHTML = data.mode.startsWith("demo")
       ? `<b>Demo data.</b> Add a <b>GITHUB_TOKEN</b> in Vercel to see real bounties.`
        : `<b>Running without a token.</b> Add <b>GITHUB_TOKEN</b> in Vercel for reliable results.`;
    } else banner.style.display="none";*/
    // Notify about new high-score bounties.
    const fresh = bounties.filter(b=>b.score>=70 && !prevIds.has(b.id));
    if(prevIds.size && fresh.length && Notification?.permission==="granted"){
      new Notification(`${fresh.length} new high-value bounty${fresh.length>1?"ies":""}`,
        {body: fresh[0].title, icon:"/icon-192.png"});
    }
    render();
  }catch(e){ line.textContent = "Couldn't reach the API. Try again."; }
}

document.getElementById("refreshBtn").onclick = refresh;
document.getElementById("notifyBtn").onclick = async ()=>{
  if(!("Notification" in window)) return alert("Notifications not supported on this device.");
  const p = await Notification.requestPermission();
  if(p==="granted") new Notification("Alerts on ✅",{body:"You'll be pinged about new high-value bounties.",icon:"/icon-192.png"});
};

renderFilters();
refresh();
setInterval(refresh, 5*60*1000); // auto-refresh every 5 min while open

if("serviceWorker" in navigator){ navigator.serviceWorker.register("/sw.js").catch(()=>{}); }
</script>
</body>
</html>
